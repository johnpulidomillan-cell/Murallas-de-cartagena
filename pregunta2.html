<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafío de Privacidad - Pregunta 2</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #e8f5e9; /* Un verde suave para variar el ambiente */
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .tarjeta-pregunta {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            max-width: 550px;
            border-left: 8px solid #2e7d32; /* Verde oscuro */
        }
        .opciones {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        button.opcion {
            padding: 15px;
            font-size: 1rem;
            cursor: pointer;
            border: 2px solid #2e7d32;
            background: white;
            border-radius: 8px;
            transition: 0.3s;
        }
        button.opcion:hover {
            background-color: #f1f8e9;
        }
        .boton-pista {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #ffd600;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="tarjeta-pregunta">
        <p>Hay muchas cosas divertidas en Internet. Muchos sitios web tienen encuestas y concursos en los que puedes participar para ganar premios.</p>
        <h3>¿Por qué los sitios web usan encuestas y concursos?</h3>
        
        <div class="opciones">
            <button class="opcion" onclick="validar(false)">Para darte la oportunidad de ganar premios</button>
            <button class="opcion" onclick="validar(true)">Para obtener tu información personal</button>
        </div>
    </div>

    <button class="boton-pista" onclick="mostrarPista()">💡 Pista</button>

    <script>
        function mostrarPista() {
            alert("Pista: ¡Nada es gratis en Internet! Piensa en qué te piden a cambio de participar (nombre, correo, edad...).");
        }

        function validar(esCorrecto) {
    if(esCorrecto) {
        alert("¡Increíble! Has recuperado el segundo pedazo del mapa. 🗺️✨");
        window.location.href = 'pregunta3.html'; // <--- Esta línea hace la conexión
    } else {
                alert("Mmm... los premios son el 'gancho', pero ¿cuál es el verdadero objetivo del pirata?");
            }
        }
    </script>

</body>
</html>
