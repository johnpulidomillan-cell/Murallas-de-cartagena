<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafío de Privacidad - Pregunta 4</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #e1f5fe; /* Azul cielo claro */
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .tarjeta-pregunta {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            max-width: 550px;
            border-left: 8px solid #0288d1;
        }
        .opciones {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        button.opcion {
            padding: 15px;
            font-size: 1rem;
            cursor: pointer;
            border: 2px solid #0288d1;
            background: white;
            border-radius: 8px;
            transition: 0.3s;
        }
        button.opcion:hover {
            background-color: #f1faff;
        }
        .boton-pista {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #ffd600;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="tarjeta-pregunta">
        <p>Puede ser muy divertido ver fotos y videos en Internet. ¡Tú también podrías publicar tus fotos y videos!</p>
        <h3>¿Quién podría ver las fotos o videos que publiques en Internet?</h3>
        
        <div class="opciones">
            <button class="opcion" onclick="validar(true)">Cualquiera</button>
            <button class="opcion" onclick="validar(false)">Solo las personas a las que se los envíes</button>
        </div>
    </div>

    <button class="boton-pista" onclick="mostrarPista()">💡 Pista</button>

    <script>
        function mostrarPista() {
            alert("Pista: Una vez que algo está en Internet, puede ser compartido, copiado o buscado por personas que ni siquiera conoces.");
        }

        function validar(esCorrecto) {
            if(esCorrecto) {
                alert("¡Impresionante! Has recuperado el cuarto pedazo del mapa. ¡Ya casi tienes la mitad! 🗺️⚓");
                // window.location.href = 'pregunta5.html';
            } else {
                alert("Ten cuidado... aunque se lo envíes a un amigo, esa persona podría reenviarlo a alguien más. ¿Quién más podría llegar a verlo?");
            }
        }
    </script>

</body>
</html>
